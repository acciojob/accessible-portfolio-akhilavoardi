<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 role="heading">John Doe - Portfolio</h1>
    </header>

    <nav role="navigation">
        <ul role="list">
            <li role="listitem"><a href="#about">About</a></li>
            <li role="listitem"><a href="#projects">Projects</a></li>
            <li role="listitem"><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="about">
            <img 
                role="img"
                src="profile.jpg" 
                alt="Portrait of John Doe"
                width="200"
            >

            <p>
                Hello! I am John Doe, a web developer passionate about
                creating accessible and user-friendly websites.
            </p>
        </section>

        <section id="projects">
            <h2>Skills</h2>

            <ul role="list">
                <li role="listitem">HTML5 & CSS3</li>
                <li role="listitem">JavaScript</li>
                <li role="listitem">Responsive Web Design</li>
            </ul>
        </section>
    </main>

</body>
</html>
